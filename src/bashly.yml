name: sgit
help: Syntactic sugar for Git, respecting semantics and modern conventions
version: 1.0.0

flags:
  - long: --git-remote
    short: -R
    arg: remote
    help: "Override the remote name (default: auto-detected or origin)"

commands:
  - name: ls
    help: "List all branches, only remote or only local"
    group: Branches
    flags:
      - long: --remote
        short: -r
        help: List only remote branches
      - long: --local
        short: -l
        help: List only local branches

  - name: take
    alias: mkdir
    help: "Create new branch"
    group: Branches
    args:
      - name: description
        help: "The description is a brief explanation about the branch purpose"
    flags:
      - long: --remote
        help: "Also create the branch in the remote"
      - long: --only-remote
        short: -O
        help: "Only create the branch in the remote"
      - long: --main
        help: "The production branch"
      - long: --staging
        short: -s
        help: "Demo branch and decisions about release features"
      - long: --test
        short: -t
        help: "Contains all codes ready for QA testing"
      - long: --dev
        short: -d
        help: "All new features and bug fixes; codes conflicts should be done here"
      - long: --feature
        short: -f
        arg: description
        help: "Any code changes for a new module or use case; should be created based on the current development branch"
      - long: --bugfix
        short: -b
        arg: description
        help: "If the code changes made from the feature branch were rejected after a release, sprint or demo"
      - long: --hotfix
        short: -H
        arg: description
        help: "If there is a need to fix something that should be handled immediately; could be merged directly to the production branch"
      - long: --experimental
        short: -e
        arg: description
        help: "Any new feature or idea that is not part of a release or a sprint; a branch for playing around"
      - long: --build
        short: -u
        arg: description
        help: "A branch specifically for creating specific build artifacts or for doing code coverage runs"
      - long: --release
        short: -r
        arg: description
        help: "A branch for tagging a specific release version"
      - long: --merge
        short: -m
        arg: description
        help: "Resolving merge conflicts, usually between the latest development and a feature or hotfix branch; also to merge two branches of one feature"
      - long: --from
        short: -F
        arg: branch
        help: "Base branch to create the new branch from"
    examples:
      - "[Command]"
      - ' - sgit take -f "my really awesome feature" -o'
      - "[Result]"
      - ' - git checkout -b "feature/my-really-awesome-feature"'
      - ' - git push origin "feature/my-really-awesome-feature"'

  - name: cd
    help: "Change the current working branch"
    group: Branches
    completions:
      - $(git branch 2> /dev/null)
    args:
      - name: branch
        help: "The branch to go to"
        required: true
    examples:
      - "[Command]"
      - " - sgit cd main"
      - "[Result]"
      - ' - git checkout "main"'

  - name: mv
    help: "Rename some branch"
    group: Branches
    completions:
      - $(git branch 2> /dev/null)
    args:
      - name: old_branch
        help: "The current branch you want to rename"
        required: true
      - name: new_branch
        help: "The new name for branch"
        required: true
    flags:
      - long: --remote
        short: -r
        help: "Also rename the branch in the remote"
      - long: --only-remote
        short: -O
        help: "Only rename the branch in the remote"

  - name: rm
    help: "Delete some branch"
    group: Branches
    completions:
      - $(git branch 2> /dev/null)
    args:
      - name: branch
        help: "Branch to delete; if none are informed, delete the current one"
    flags:
      - long: --remote
        short: -r
        help: "Also delete the branch in the remote"
      - long: --only-remote
        short: -O
        help: "Only delete the branch in the remote"

  - name: clean
    help: "Delete branches that have been merged into main"
    group: Branches
    flags:
      - long: --remote
        short: -r
        help: "Also delete merged branches from the remote"
      - long: --yes
        short: -y
        help: "Skip confirmation"

  - name: worktree
    alias: wt
    help: "Manage git worktrees with automatic setup"
    group: Branches

    commands:
      - name: add
        help: "Create a new worktree with automatic setup"
        args:
          - name: branch
            help: "Branch name (auto-generates wt-<uuid> if omitted)"
        flags:
          - long: --symlink
            short: -s
            arg: path
            help: "Path to symlink into the worktree (repeatable)"
            repeatable: true
          - long: --from
            arg: branch
            help: "Base branch to create the new branch from"
          - long: --no-install
            help: "Skip automatic dependency installation"
          - long: --no-link
            help: "Skip all symlinking"

      - name: link
        help: "Add symlinks to current worktree from main worktree"
        flags:
          - long: --symlink
            short: -s
            arg: path
            help: "Path to symlink (repeatable)"
            repeatable: true
            required: true

      - name: ls
        help: "List all worktrees"

      - name: rm
        help: "Remove a worktree"
        args:
          - name: name
            help: "Worktree folder name to remove"
            required: true

      - name: prune
        help: "Clean up stale worktree references"

  - name: auth
    help: "Save credentials storage in git repository"
    group: State
    flags:
      - long: --global
        short: -g
        help: "Enable credentials storage globally"

  - name: remote
    help: "Show the current remote repository"
    group: State
    flags:
      - long: --add
        short: -a
        arg: add
        help: "Add or replace the current origin remote repository"
      - long: --remove
        short: -r
        help: "Remove the current origin remote repository"

  - name: wipe
    help: "Wipe the working branch as per the remote branch"
    group: State
    completions:
      - $(git branch 2> /dev/null)
    args:
      - name: branch
        help: "Branch to wipe; if none are informed, wipe the current one"
    flags:
      - long: --yes
        short: -y
        help: "Skip confirmation"

  - name: undo
    alias: rb
    help: "Back the commit history, but it preserves the file contents"
    group: State
    args:
      - name: commit_id
        help: "The commit ID; if none are informed, undo the last commit"

  - name: edit
    help: "Edit some commit message"
    group: State
    args:
      - name: commit_id
        help: "The commit ID; if none are informed, edit the last commit"
      - name: message
        help: "New commit message; if provided, no editor opens"

  - name: squash
    help: "Squash the last N commits into one"
    group: State
    args:
      - name: count
        help: "Number of commits to squash"
        required: true
      - name: message
        help: "Commit message for the squashed commit (opens editor if omitted)"
    examples:
      - "[Command]"
      - ' - sgit squash 3 "feat: unified auth flow"'
      - "[Result]"
      - " - git reset --soft HEAD~3"
      - ' - git commit -m "feat: unified auth flow"'

  - name: get
    help: "Fetch and merge changes from remote branch to working branch (pull shortcut)"
    group: State
    completions:
      - $(git branch 2> /dev/null)
    args:
      - name: branch
        help: "Branch name to get"
    flags:
      - long: --force
        short: -f
        help: "Overwrite existing local commits in case conflicts"
      - long: --rebase
        short: -r
        help: "Rebase instead of merge when pulling"

  - name: put
    completions:
      - $(git branch 2> /dev/null)
    help: "Send committed changes from working branch to the respective remote branch (push shortcut)"
    group: State
    args:
      - name: branch
        help: "Branch name to put"
    flags:
      - long: --force
        short: -f
        help: "Overwrite existing origin commits in case conflicts"

  - name: sync
    help: "Sync current branch by fetching and rebasing on top of a remote branch (defaults to main)"
    group: State
    completions:
      - $(git branch 2> /dev/null)
    args:
      - name: branch
        help: "Branch name to sync from (defaults to main)"
    flags:
      - long: --continue
        short: -c
        help: "Continue the rebase after resolving conflicts"
      - long: --abort
        short: -a
        help: "Abort the current rebase and restore original branch state"
      - long: --skip
        short: -s
        help: "Skip the current conflicting commit and continue rebase"
    examples:
      - "[Sync with main (default)]"
      - " - sgit sync"
      - "[Result]"
      - " - git fetch origin"
      - " - git rebase origin/main"
      - ""
      - "[Sync with a specific branch]"
      - " - sgit sync develop"
      - "[Result]"
      - " - git fetch origin"
      - " - git rebase origin/develop"
      - ""
      - "[Resolve conflicts after sync]"
      - " - sgit sync -c    # continue after fixing conflicts"
      - " - sgit sync -s    # skip the conflicting commit"
      - " - sgit sync -a    # abort and undo the rebase"

  - name: cherry
    help: "Cherry-pick a commit into the current branch"
    group: State
    args:
      - name: commit
        help: "The commit hash to cherry-pick"
        required: true

  - name: merge
    help: "Merge a branch into the current branch"
    group: State
    completions:
      - $(git branch 2> /dev/null)
    args:
      - name: branch
        help: "Branch to merge"
        required: true
    flags:
      - long: --ff
        help: "Fast-forward only merge"
      - long: --no-ff
        help: "Always create a merge commit"

  - name: init
    help: "Initialize a new git repository with recommended settings"
    group: State
    flags:
      - long: --type
        short: -t
        arg: type
        help: "Generate a .gitignore for the given project type (node, python, go, rust, java, general)"
        allowed: [node, python, go, rust, java, general]

  - name: log
    alias: l
    help: "Search in the history commit by applying some filters"
    group: Consult
    args:
      - name: search_terms
        help: 'Type something to search, like "feat" to see all feature commits'
    flags:
      - long: --author
        short: -a
        arg: author
        help: "Filter by author"
      - long: --since
        short: -s
        arg: since
        help: "Filter since of..."
      - long: --until
        short: -u
        arg: until
        help: "Filter until of..."
      - long: --exclude
        short: -e
        help: "Filter excluding some term"

  - name: status
    alias: s
    help: "Show the current state of git working directory and staging area"
    group: Consult

  - name: incoming
    alias: in
    help: "Show the incoming commits from remote branch that is not in the working branch"
    group: Consult

  - name: outgoing
    alias: out
    help: "Show the outgoing commits from working branch that is not in the remote branch"
    group: Consult

  - name: committers
    alias: cm
    help: "Show the committers of the current branch"
    group: Consult

  - name: diff
    help: "Show changes between commits, working tree, or staging area"
    group: Consult
    args:
      - name: target
        help: "Branch or commit to compare against"
    flags:
      - long: --staged
        short: -s
        help: "Show changes in the staging area"

  - name: add
    catch_all: string
    completions:
      - <directory>
      - <file>
    help: "Add files or directories to staging area"
    group: Staging

  - name: unstage
    alias: sub
    catch_all: string
    completions:
      - <directory>
      - <file>
    help: "Remove files or directories from staging area"
    group: Staging
    flags:
      - long: --all
        short: -a
        help: "Remove all files or directories from staging area"

  - name: amend
    help: "Add all untracked, modified and deleted files to the last commit without edit the message"
    group: Staging
    flags:
      - long: --add
        short: -a
        arg: add
        help: "Add specific untracked, modified and deleted file to this commit"
      - long: --add-all
        short: -A
        help: "Add all untracked, modified and deleted files to this commit"
      - long: --put
        short: -p
        help: "Put this commit directly on the remote branch"
      - long: --force
        short: -f
        help: "If pushed, overwrite existing commits in case conflicts"
      - long: --date
        short: -d
        arg: date
        help: "Set commit date in YYYY-MM-DD format (must be used with --time)"
      - long: --time
        short: -t
        arg: time
        help: "Set commit time in HH:MM:SS format (must be used with --date)"
      - long: --message
        short: -m
        arg: message
        help: "Change the commit message while amending"

  - name: resolve
    help: "Resolve conflicts in the working branch"
    group: Staging
    flags:
      - long: --ours
        short: -o
        help: "Resolve conflicts using the working branch version"
      - long: --theirs
        short: -t
        help: "Resolve conflicts using the remote branch version"

  - name: tag
    alias: t
    help: "Add an annotated tag with the description same as the message"
    group: Staging
    args:
      - name: message
        help: The annotated/message

  - name: stash
    help: "Manage work-in-progress changes"
    group: Staging

    commands:
      - name: put
        help: "Save current changes to stash"
        catch_all:
          label: Files
          help: "Specific files to stash"
        flags:
          - long: --message
            short: -m
            arg: message
            help: "Add a message to the stash entry"
          - long: --untracked
            short: -u
            help: "Include untracked files"

      - name: get
        help: "Restore stashed changes and remove from stash"
        args:
          - name: index
            help: "Stash index to restore (default: 0)"

      - name: ls
        help: "List all stash entries"

      - name: peek
        help: "Preview stash contents without applying"
        args:
          - name: index
            help: "Stash index to peek at (default: 0)"
        flags:
          - long: --stat
            short: -s
            help: "Show only a summary of changed files"

      - name: keep
        help: "Apply stashed changes without removing from stash"
        args:
          - name: index
            help: "Stash index to apply (default: 0)"

      - name: drop
        help: "Remove a stash entry"
        args:
          - name: index
            help: "Stash index to drop (default: 0)"
        flags:
          - long: --all
            short: -a
            help: "Remove all stash entries"
          - long: --yes
            short: -y
            help: "Skip confirmation when dropping all"

      - name: move
        help: "Move current changes to another branch via stash"
        args:
          - name: branch
            help: "Target branch to move changes to"
            required: true
        flags:
          - long: --message
            short: -m
            arg: message
            help: "Add a message to the stash entry"

  - name: commit
    alias: c
    help: "Commit with a custom message"
    group: Commit
    completions:
      - <directory>
      - <file>
    args:
      - name: description
        help: "The commit message"
    flags:
      - long: --edit
        short: -e
        help: "Open default editor to complete commit description"
      - long: --add
        short: -a
        arg: add
        help: "Add specific untracked, modified and deleted file to this commit"
      - long: --add-all
        short: -A
        help: "Add all untracked, modified and deleted files to this commit"
      - long: --put
        short: -p
        help: "Put this commit directly on the remote branch"
      - long: --force
        short: -f
        help: "If pushed, overwrite existing commits in case conflicts"
      - long: --date
        short: -d
        arg: date
        help: "Set commit date in YYYY-MM-DD format (must be used with --time)"
      - long: --time
        short: -t
        arg: time
        help: "Set commit time in HH:MM:SS format (must be used with --date)"
    examples:

  - name: build
    alias: bd
    help: "Changes that affect the build system or external dependencies (example scopes: gulp, broccoli, npm)"
    group: Commit
    completions:
      - <directory>
      - <file>
    args:
      - name: description
        help: "The description is a short summary of the code changes"
    flags:
      - long: --scope
        short: -s
        arg: scope
        help: "Provides a scope consisting of a noun to provide additional contextual information"
      - long: --breaking-change
        short: -b
        help: "Draw attention to breaking change"
      - long: --edit
        short: -e
        help: "Open default editor to complete commit description"
      - long: --add
        short: -a
        arg: add
        help: "Add specific untracked, modified and deleted file to this commit"
      - long: --add-all
        short: -A
        help: "Add all untracked, modified and deleted files to this commit"
      - long: --put
        short: -p
        help: "Put this commit directly on the remote branch"
      - long: --force
        short: -f
        help: "If pushed, overwrite existing commits in case conflicts"
      - long: --date
        short: -d
        arg: date
        help: "Set commit date in YYYY-MM-DD format (must be used with --time)"
      - long: --time
        short: -t
        arg: time
        help: "Set commit time in HH:MM:SS format (must be used with --date)"
    examples:
      - "[Command]"
      - ' - sgit build "add express types" -a package.json'
      - "[Result]"
      - " - git add package.json"
      - ' - git commit -m "build: add express types"'

  - name: chore
    alias: ch
    help: "Code change that external user won't see (eg: change to .gitignore file or .prettierrc file)"
    group: Commit
    completions:
      - <directory>
      - <file>
    args:
      - name: description
        help: "The description is a short summary of the code changes"
    flags:
      - long: --scope
        short: -s
        arg: scope
        help: "Provides a scope consisting of a noun to provide additional contextual information"
      - long: --breaking-change
        short: -b
        help: "Draw attention to breaking change"
      - long: --edit
        short: -e
        help: "Open default editor to complete commit description"
      - long: --add
        short: -a
        arg: add
        help: "Add specific untracked, modified and deleted file to this commit"
      - long: --add-all
        short: -A
        help: "Add all untracked, modified and deleted files to this commit"
      - long: --put
        short: -p
        help: "Put this commit directly on the remote branch"
      - long: --force
        short: -f
        help: "If pushed, overwrite existing commits in case conflicts"
      - long: --date
        short: -d
        arg: date
        help: "Set commit date in YYYY-MM-DD format (must be used with --time)"
      - long: --time
        short: -t
        arg: time
        help: "Set commit time in HH:MM:SS format (must be used with --date)"
    examples:
      - "[Command]"
      - ' - sgit chore -s "router" "allow to extend other configs" -A'
      - "[Result]"
      - " - git add --all"
      - ' - git commit -m "chore(router): update public api"'

  - name: ci
    help: "Changes to our CI configuration files and scripts (example scopes: Travis, Circle, BrowserStack, SauceLabs)"
    group: Commit
    completions:
      - <directory>
      - <file>
    args:
      - name: description
        help: "The description is a short summary of the code changes"
    flags:
      - long: --scope
        short: -s
        arg: scope
        help: "Provides a scope consisting of a noun to provide additional contextual information"
      - long: --breaking-change
        short: -b
        help: "Draw attention to breaking change"
      - long: --edit
        short: -e
        help: "Open default editor to complete commit description"
      - long: --add
        short: -a
        arg: add
        help: "Add specific untracked, modified and deleted file to this commit"
      - long: --add-all
        short: -A
        help: "Add all untracked, modified and deleted files to this commit"
      - long: --put
        short: -p
        help: "Put this commit directly on the remote branch"
      - long: --force
        short: -f
        help: "If pushed, overwrite existing commits in case conflicts"
      - long: --date
        short: -d
        arg: date
        help: "Set commit date in YYYY-MM-DD format (must be used with --time)"
      - long: --time
        short: -t
        arg: time
        help: "Set commit time in HH:MM:SS format (must be used with --date)"
    examples:
      - "[Command]"
      - " - sgit ci"
      - "[Result]"
      - ' - git commit -m "ci: " --edit'
      - " - * Open default editor to complete the message *"

  - name: docs
    alias: dc
    help: "Documentation only changes"
    group: Commit
    completions:
      - <directory>
      - <file>
    args:
      - name: description
        help: "The description is a short summary of the code changes"
    flags:
      - long: --scope
        short: -s
        arg: scope
        help: "Provides a scope consisting of a noun to provide additional contextual information"
      - long: --breaking-change
        short: -b
        help: "Draw attention to breaking change"
      - long: --edit
        short: -e
        help: "Open default editor to complete commit description"
      - long: --add
        short: -a
        arg: add
        help: "Add specific untracked, modified and deleted file to this commit"
      - long: --add-all
        short: -A
        help: "Add all untracked, modified and deleted files to this commit"
      - long: --put
        short: -p
        help: "Put this commit directly on the remote branch"
      - long: --force
        short: -f
        help: "If pushed, overwrite existing commits in case conflicts"
      - long: --date
        short: -d
        arg: date
        help: "Set commit date in YYYY-MM-DD format (must be used with --time)"
      - long: --time
        short: -t
        arg: time
        help: "Set commit time in HH:MM:SS format (must be used with --date)"
    examples:
      - "[Command]"
      - ' - sgit docs "update per tech review" -Apfe'
      - "[Result]"
      - " - git add --all"
      - ' - git commit -m "docs: update per tech review" --edit'
      - " - * Open default editor to complete the message *"
      - " - git push --force"

  - name: feat
    alias: ft
    help: "New feature"
    group: Commit
    completions:
      - <directory>
      - <file>
    args:
      - name: description
        help: "The description is a short summary of the code changes"
    flags:
      - long: --scope
        short: -s
        arg: scope
        help: "Provides a scope consisting of a noun to provide additional contextual information"
      - long: --breaking-change
        short: -b
        help: "Draw attention to breaking change"
      - long: --edit
        short: -e
        help: "Open default editor to complete commit description"
      - long: --add
        short: -a
        arg: add
        help: "Add specific untracked, modified and deleted file to this commit"
      - long: --add-all
        short: -A
        help: "Add all untracked, modified and deleted files to this commit"
      - long: --put
        short: -p
        help: "Put this commit directly on the remote branch"
      - long: --force
        short: -f
        help: "If pushed, overwrite existing commits in case conflicts"
      - long: --date
        short: -d
        arg: date
        help: "Set commit date in YYYY-MM-DD format (must be used with --time)"
      - long: --time
        short: -t
        arg: time
        help: "Set commit time in HH:MM:SS format (must be used with --date)"
    examples:
      - "[Command]"
      - ' - sgit feat -s "service-worker" "expose more version update events" -bea "-p src/index.ts"'
      - "[Result]"
      - " - git add -p src/index.ts"
      - ' - git commit -m "feat(service-worker)!: expose more version update events" --edit'
      - " - * Open default editor to complete the message *"

  - name: fix
    help: "Bug fix"
    group: Commit
    completions:
      - <directory>
      - <file>
    args:
      - name: description
        help: "The description is a short summary of the code changes"
    flags:
      - long: --scope
        short: -s
        arg: scope
        help: "Provides a scope consisting of a noun to provide additional contextual information"
      - long: --breaking-change
        short: -b
        help: "Draw attention to breaking change"
      - long: --edit
        short: -e
        help: "Open default editor to complete commit description"
      - long: --add
        short: -a
        arg: add
        help: "Add specific untracked, modified and deleted file to this commit"
      - long: --add-all
        short: -A
        help: "Add all untracked, modified and deleted files to this commit"
      - long: --put
        short: -p
        help: "Put this commit directly on the remote branch"
      - long: --force
        short: -f
        help: "If pushed, overwrite existing commits in case conflicts"
      - long: --date
        short: -d
        arg: date
        help: "Set commit date in YYYY-MM-DD format (must be used with --time)"
      - long: --time
        short: -t
        arg: time
        help: "Set commit time in HH:MM:SS format (must be used with --date)"
    examples:
      - "[Command]"
      - ' - sgit fix "clear service worker cache in safety worker" -Aps "service-worker"'
      - "[Result]"
      - " - git add --all"
